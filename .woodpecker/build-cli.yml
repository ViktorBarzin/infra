when:
  event: push

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      attempts: 5
      backoff: 10s

steps:
  - name: build-image
    image: woodpeckerci/plugin-docker-buildx
    settings:
      username: "viktorbarzin"
      password:
        from_secret: dockerhub-pat
      repo:
        - viktorbarzin/infra
        - registry.viktorbarzin.me:5050/infra
      logins:
        - registry: https://index.docker.io/v1/
          username: viktorbarzin
          password:
            from_secret: dockerhub-pat
        # Private registry on :5050 requires htpasswd auth since 2026-03-22.
        # Without this, buildx pushes the second repo but blob HEAD comes
        # back 401 → pipeline fails → CI false-negative (see bd code-12b).
        - registry: registry.viktorbarzin.me:5050
          username:
            from_secret: registry_user
          password:
            from_secret: registry_password
      dockerfile: cli/Dockerfile
      context: cli
      auto_tag: true
      # cache_from/cache_to removed: registry cache corruption causes
      # "short read: expected 32 bytes" BuildKit errors. Inline cache
      # will be re-populated once a clean image is pushed.
      # cache_from: "registry.viktorbarzin.me:5050/infra:latest"
      # cache_to: "type=inline"
