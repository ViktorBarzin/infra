# Cinemeta reverse-proxy (infra#80 follow-up) — see main.tf "cinemeta proxy" block.
#
# Re-serves Stremio's Cinemeta addon through cinemeta.viktorbarzin.me so it works
# on Viktor's Meta-managed Mac, whose endpoint firewall (uberAgent) blocks
# *.strem.io. The Stremio web client fetches catalogs/meta CLIENT-SIDE, so the
# browser must reach a non-strem.io host; this nginx (in-cluster, behind Traefik)
# fetches v3-cinemeta.strem.io itself and FOLLOWS Cinemeta's catalog 307 to
# cinemeta-catalogs.strem.io server-side, so the browser never touches strem.io.
#
# In-cluster (not a CF Worker) specifically so the host resolves BOTH ways:
# publicly via the CF `*` wildcard -> tunnel -> Traefik -> here, AND internally
# via Technitium's ingress-DNS-sync (cinemeta -> apex -> Traefik -> here). A CF
# Worker only lives at the edge, so internal clients (home LAN on Technitium) got
# NXDOMAIN — and since the account's protected com.linvo.cinemeta was removed in
# favour of this proxy, EVERY device depends on it resolving. See infra#80.

server {
  listen 8080;
  server_name _;
  # In-cluster resolver = kube-dns; resolves the external strem.io upstreams
  # (CoreDNS forwards non-cluster names upstream). ipv6=off: proxy over IPv4.
  resolver 10.96.0.10 ipv6=off valid=30s;
  resolver_timeout 5s;

  set $cinemeta "v3-cinemeta.strem.io";

  # Local liveness/readiness target — 200 without touching the external upstream,
  # so a transient strem.io blip never restarts the proxy pods.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # manifest: rewrite id/name so Stremio installs this as a DISTINCT addon from
  # the official com.linvo.cinemeta (kept consistent with the account entry
  # com.viktorbarzin.cinemeta-proxy already set via addonCollectionSet).
  location = /manifest.json {
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    if ($request_method = OPTIONS) { return 204; }

    proxy_pass https://$cinemeta/manifest.json;
    proxy_set_header Host $cinemeta;
    proxy_set_header Accept-Encoding "";      # disable upstream gzip so sub_filter can rewrite
    proxy_ssl_server_name on;
    proxy_hide_header content-security-policy;
    sub_filter_types application/json;
    sub_filter_once off;
    sub_filter "com.linvo.cinemeta"   "com.viktorbarzin.cinemeta-proxy";
    sub_filter "\"name\":\"Cinemeta\"" "\"name\":\"Cinemeta (proxied)\"";
  }

  # catalog / meta / addon_catalog: proxy to v3-cinemeta and follow its catalog
  # 307 (-> cinemeta-catalogs.strem.io) generically, so every catalog shape
  # (top, pagination skip=, genre=, search) works without hardcoding the target.
  location / {
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    if ($request_method = OPTIONS) { return 204; }

    proxy_pass https://$cinemeta;
    proxy_set_header Host $cinemeta;
    proxy_ssl_server_name on;
    proxy_intercept_errors on;
    error_page 301 302 307 308 = @follow;
  }

  location @follow {
    add_header Access-Control-Allow-Origin "*" always;
    set $redir $upstream_http_location;       # full URL from the upstream Location header
    proxy_pass $redir;
    proxy_ssl_server_name on;
  }
}
