authentik:
  # NOTE: because we set existingSecret below, the chart does NOT render the
  # authentik.* values into an AUTHENTIK_* env Secret — the live env comes
  # from the orphaned, helm-keep-policy `goauthentik` Secret created by chart
  # 2025.10.3. Anything under authentik.* here is effectively INERT. All new
  # or tuned config MUST go through server.env / worker.env instead (see
  # .claude/reference/authentik-state.md).
  log_level: warning
  # log_level: trace
  secret_key: ""
  existingSecret:
    secretName: "goauthentik"
  # This sends anonymous usage-data, stack traces on errors and
  # performance data to authentik.error-reporting.a7k.io, and is fully opt-in
  error_reporting:
    enabled: false
  postgresql:
    # host: postgresql.dbaas
    host: pgbouncer.authentik
    port: 6432
    user: authentik
    password: ""

server:
  replicas: 3
  env:
    # Anonymous Django sessions (no completed login: bots, healthcheckers,
    # partial flows) expire in 2h. Default is days=1. Once login completes,
    # UserLoginStage.session_duration takes over via request.session.set_expiry.
    # Injected via server.env (not authentik.sessions.*) because we use
    # authentik.existingSecret.secretName, which makes the chart skip
    # rendering the AUTHENTIK_* secret — so the values block doesn't reach env.
    - name: AUTHENTIK_SESSIONS__UNAUTHENTICATED_AGE
      value: "hours=2"
    # Gunicorn: 3 workers × 4 threads per server pod (defaults 2×4).
    # Pairs with the server memory limit of 2Gi (each worker preloads
    # Django ~500Mi).
    - name: AUTHENTIK_WEB__WORKERS
      value: "3"
    - name: AUTHENTIK_WEB__THREADS
      value: "4"
    # Gunicorn worker recycle hardening (defaults max_requests=1000/jitter=50).
    # A worker recycle that coincides with a transient PG/pgbouncer blip stalls
    # in-flight requests (sessions+cache are on PostgreSQL since Redis was removed
    # in 2026.2), and with 9 workers recycling on a tight 50-jitter window the
    # recycles cluster — feeding the episodic all-pods-NotReady 502/504 cascade.
    # 10x rarer recycles + 20x wider jitter (1000) decorrelate them from DB blips.
    - name: AUTHENTIK_WEB__MAX_REQUESTS
      value: "10000"
    - name: AUTHENTIK_WEB__MAX_REQUESTS_JITTER
      value: "1000"
    # Cache flow plans for 30m and policy evaluations for 15m (defaults 300s).
    # Authentik 2026.2 stores cache in Postgres, so a TTL hit is still a
    # SELECT — but a single indexed lookup beats re-planning the flow
    # (~70 sequential ORM ops per flow stage POST).
    - name: AUTHENTIK_CACHE__TIMEOUT_FLOWS
      value: "1800"
    - name: AUTHENTIK_CACHE__TIMEOUT_POLICIES
      value: "900"
    # SMTP for signup verification + recovery email (tripit ADR-0020): send as
    # noreply@viktorbarzin.me (SASL, 587/STARTTLS); password from the
    # authentik-email ExternalSecret (Vault secret/authentik.smtp_password). Set
    # on server AND worker — the worker runs the email tasks, the server
    # validates the Email stage config.
    # HOST is the PUBLIC name mail.viktorbarzin.me, NOT the in-cluster svc
    # (mailserver.mailserver.svc): the mailserver serves the *.viktorbarzin.me
    # wildcard cert, which does not cover the svc DNS name, and Authentik
    # verifies the STARTTLS hostname strictly (unlike most of our apps' SMTP
    # clients) — the svc name fails CERTIFICATE_VERIFY_FAILED. mail.viktorbarzin.me
    # resolves in-cluster (10.0.20.1) and matches the cert.
    - name: AUTHENTIK_EMAIL__HOST
      value: "mail.viktorbarzin.me"
    - name: AUTHENTIK_EMAIL__PORT
      value: "587"
    - name: AUTHENTIK_EMAIL__USE_TLS
      value: "true"
    - name: AUTHENTIK_EMAIL__USERNAME
      value: "noreply@viktorbarzin.me"
    # Display name is generic ("No Reply"), NOT an app name: this is the GLOBAL
    # from for ALL Authentik mail — admin notifications (e.g. the
    # update_available alert) as well as any recovery/enrollment mail — and the
    # notification transport has no per-message from override. Was "TripIt"
    # (leaked onto admin notifications); made generic 2026-07-24. The address
    # noreply@viktorbarzin.me is unchanged, so SASL/SPF/deliverability are too.
    - name: AUTHENTIK_EMAIL__FROM
      value: "No Reply <noreply@viktorbarzin.me>"
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-email
          key: AUTHENTIK_EMAIL__PASSWORD
    # Do NOT set AUTHENTIK_POSTGRESQL__CONN_MAX_AGE here. With PgBouncer in
    # session mode every persistent Django connection pins a server connection
    # 1:1, so the 3x(20+5) pool saturated during the 2026-06-10 rolling
    # restart (58s pool waits, readiness flapping, and the shared CNPG primary
    # failed over mid-storm). The ~1-2ms/request connection-setup saving is
    # not worth that risk on the shared PG substrate.
  # Liveness budget sized for slow boots (2026-06-10 incident): during a
  # rolling restart pods queue on authentik's DB migration lock; the go layer
  # answers /-/health/live before the core is up, so with the default 3x10s
  # budget kubelet kill-looped every booting pod and amplified the contention.
  # Startup probe still bounds total boot time (60x10s).
  livenessProbe:
    failureThreshold: 6
    timeoutSeconds: 5
  # Readiness widened from the chart default (3x10s/3s ~= 30s) to ~80s. The
  # readiness probe (/-/health/ready/) queries the DB, so a sub-~60s PG/pgbouncer
  # transient otherwise returns 503 and drops ALL 3 server pods from the Service
  # at once -> Traefik has no healthy backend -> 502/504 (the episodic blank
  # screen + 30s hang). 80s absorbs a full CNPG failover reconnect; liveness
  # still reaps a truly hung pod. Partial override — the chart deep-merges the
  # httpGet path /-/health/ready/ (same as the livenessProbe override above).
  readinessProbe:
    failureThreshold: 8
    periodSeconds: 10
    timeoutSeconds: 5
  # RollingUpdate strategy. The chart key is `deploymentStrategy`, NOT `strategy`
  # (authentik.server reads .Values.server.deploymentStrategy) — the old
  # `strategy:` key was silently ignored, so live ran the chart default 25%/25%
  # and every rolling event dropped a server pod out of rotation, amplifying the
  # NotReady cascade. maxSurge:1 + maxUnavailable:0 keeps all 3 ready throughout
  # a roll (PDB minAvailable:2 + ResourceQuota headroom allow the transient pod).
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 1.5Gi
    limits:
      memory: 2Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: server
  ingress:
    enabled: false
    # hosts:
    #   - authentik.viktorbarzin.me
  podAnnotations:
    diun.enable: true
    diun.include_tags: "^202[0-9].[0-9]+.*$" # no need to annotate the worker as it uses the same image
  pdb:
    enabled: true
    minAvailable: 2
global:
  addPrometheusAnnotations: true
  image:
    # CUSTOM OVERLAY: two thin patches over the official authentik server image
    # (see stacks/authentik/Dockerfile): (1) SLOW-1a — narrows the login-flow
    # select_subclasses() query, ~1.4s -> ~14ms; (2) serve authentik's no-JS SFE
    # login to old Safari/WebKit AND any iOS browser (Chrome/Firefox = WebKit) on
    # iOS<=16.3 so old devices (e.g. iPadOS<=15) get a working login instead of a
    # blank page, and injects social-login links into the SFE (it can't render
    # sources; needed for password-less Google-only accounts). Built by
    # .github/workflows/build-authentik.yml to ghcr.io/viktorbarzin/authentik-server
    # (public package, anonymous pull — no imagePullSecret needed, like the
    # upstream goauthentik image). Keel is NO LONGER enrolled for this namespace
    # (see main.tf) so it can't bump/downgrade the tag; helm also defaults the tag
    # to the chart appVersion (2026.2.2) — so BOTH repository AND tag are pinned
    # explicitly here to prevent the 2026-06-10 downgrade-boot-storm class.
    # UPGRADE = bump the Dockerfile FROM tag + this tag together (e.g. ->
    # 2026.3.0-patch1), let GHA rebuild, then apply.
    repository: ghcr.io/viktorbarzin/authentik-server
    tag: "2026.2.4-patch3"

worker:
  # 2 replicas: workers handle background tasks (LDAP sync, email,
  # certificate renewal) — no user-facing traffic, so 2-of-3 isn't
  # needed for availability. Drop saves ~100m sustained CPU.
  replicas: 2
  env:
    # Same unauthenticated_age cap as server — both the server (Django session
    # middleware) and worker (cleanup tasks) need to see the value.
    - name: AUTHENTIK_SESSIONS__UNAUTHENTICATED_AGE
      value: "hours=2"
    # Dramatiq worker threads per pod (default 2).
    - name: AUTHENTIK_WORKER__THREADS
      value: "4"
    # Keep cache settings in lockstep with server.env. (No CONN_MAX_AGE —
    # see the server.env note: session-mode PgBouncer pins persistent conns.)
    - name: AUTHENTIK_CACHE__TIMEOUT_FLOWS
      value: "1800"
    - name: AUTHENTIK_CACHE__TIMEOUT_POLICIES
      value: "900"
    # SMTP (same as server.env, incl. the mail.viktorbarzin.me-not-svc-name cert
    # reason) — the worker runs Authentik's email tasks, so it needs the
    # transport too (tripit ADR-0020). noreply@viktorbarzin.me; password from the
    # authentik-email ExternalSecret.
    - name: AUTHENTIK_EMAIL__HOST
      value: "mail.viktorbarzin.me"
    - name: AUTHENTIK_EMAIL__PORT
      value: "587"
    - name: AUTHENTIK_EMAIL__USE_TLS
      value: "true"
    - name: AUTHENTIK_EMAIL__USERNAME
      value: "noreply@viktorbarzin.me"
    # Display name is generic ("No Reply"), NOT an app name: this is the GLOBAL
    # from for ALL Authentik mail — admin notifications (e.g. the
    # update_available alert) as well as any recovery/enrollment mail — and the
    # notification transport has no per-message from override. Was "TripIt"
    # (leaked onto admin notifications); made generic 2026-07-24. The address
    # noreply@viktorbarzin.me is unchanged, so SASL/SPF/deliverability are too.
    - name: AUTHENTIK_EMAIL__FROM
      value: "No Reply <noreply@viktorbarzin.me>"
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-email
          key: AUTHENTIK_EMAIL__PASSWORD
  # Chart key is `deploymentStrategy`, not `strategy` (see server above). Workers
  # serve no user traffic, so maxSurge:0/maxUnavailable:1 is fine — this is just
  # the dead-key cleanup so the declared intent actually takes effect.
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 1.5Gi
    limits:
      memory: 2Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: worker
  pdb:
    enabled: true
    maxUnavailable: 1

postgresql:
  enabled: false
