deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
replicas: 1
adminPassword: "${grafana_admin_password}"
plugins:
  - netsage-sankey-panel
resources:
  requests:
    cpu: 50m
    memory: 512Mi
  limits:
    memory: 512Mi
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: grafana
podAnnotations:
  dependency.kyverno.io/wait-for: "mysql.dbaas:3306"
podDisruptionBudget:
  maxUnavailable: 1
persistence:
  enabled: false # using external mysql
  existingClaim: "grafana-pvc"
ingress:
  enabled: "true"
  ingressClassName: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "traefik-rate-limit@kubernetescrd,traefik-csp-headers@kubernetescrd,traefik-crowdsec@kubernetescrd"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/description: "Dashboards & observability"
    gethomepage.dev/icon: "grafana.png"
    gethomepage.dev/group: "Core Platform"
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "grafana"
    gethomepage.dev/widget.url: "http://grafana.monitoring.svc.cluster.local"
    gethomepage.dev/widget.username: "admin"
    gethomepage.dev/widget.password: "${grafana_admin_password}"
  tls:
    - secretName: "tls-secret"
      hosts:
        - "grafana.viktorbarzin.me"
  hosts:
    - "grafana.viktorbarzin.me"
sidecar:
  datasources:
    enabled: "true"
  dashboards:
    enabled: true
    label: "grafana_dashboard"
    folderAnnotation: "grafana_folder"
    provider:
      foldersFromFilesStructure: true
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    name: default
    ordId: 1
    # folder: ""
    type: "file"
    # disableDeletion: "false"
    # editable: "true"
    options:
      path: "/var/lib/grafana/dashboards/default"
envFromSecrets:
  - name: grafana-db-creds
    optional: false
env:
  GF_SERVER_ROOT_URL: https://grafana.viktorbarzin.me

grafana.ini:
  database:
    type: mysql
    host: ${mysql_host}:3306
    name: grafana
    user: grafana
    password: $__env{GF_DATABASE_PASSWORD}
    ssl_mode: disable
  auth.anonymous:
    enabled: true
    org_role: Viewer
  # auth.google:
  #   enabled: true
  analytics:
    check_for_updates: "true"
  grafana_net:
    url: "https://grafana.net"
  log:
    mode: "console"
  paths:
    data: "/var/lib/grafana/data"
    logs: "/var/log/grafana"
    plugins: "/var/lib/grafana/plugins"
    provisioning: "/etc/grafana/provisioning"
  security:
    allow_embedding: true # Allow to be iframed

