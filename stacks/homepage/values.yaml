image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.10.1

# Enable RBAC. RBAC is necessary to use Kubernetes integration
enableRbac: true

serviceAccount:
  name: ""
  # Create service account. Needed when RBAC is enabled for K8s annotation auto-discovery.
  create: true

service:
  main:
    ports:
      http:
        port: 3000

controller:
  strategy: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Enable the ingress to expose Homepage to the network.
ingress:
  main:
    enabled: true
    labels:
      gethomepage.dev/enabled: "true"
    annotations:
      gethomepage.dev/name: "Homepage"
      gethomepage.dev/description: "Service dashboard"
      gethomepage.dev/group: "Core Platform"
      gethomepage.dev/icon: "homepage.png"
    ingressClassName: "traefik"
    hosts:
      - host: &host "home.viktorbarzin.me"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - *host
        secretName: ${tls_secret_name}

# All the config files for Homepage can be specified under their relevant config block.
config:
  bookmarks:
    - Developer:
        - Github:
            - abbr: Viktor Barzin
              href: https://github.com/viktorbarzin
  services: []  # All services via K8s annotation auto-discovery
  widgets:
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
  kubernetes:
    mode: cluster
  docker:
  settings:
    layout:
      Core Platform:
        style: row
        columns: 4
      Identity & Security:
        style: row
        columns: 3
      Infrastructure:
        style: row
        columns: 4
      Development & CI:
        style: row
        columns: 4
      Automation:
        style: row
        columns: 3
      Productivity:
        style: row
        columns: 4
      Media & Entertainment:
        style: row
        columns: 4
      Smart Home:
        style: row
        columns: 3
      AI & Data:
        style: row
        columns: 3
      Finance & Personal:
        style: row
        columns: 3
      Other:
        style: row
        columns: 4

env:
  HOMEPAGE_ALLOWED_HOSTS: home.viktorbarzin.me

persistence:
  logs:
    enabled: true
    type: emptyDir
    mountPath: /app/config/logs
